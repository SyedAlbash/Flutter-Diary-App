name: diary_with_lock
description: A beautiful diary app with lock feature
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  table_calendar: ^3.0.9
  image_picker: ^1.0.7
  intl: ^0.19.0
  flutter_staggered_grid_view: ^0.7.0
  pinput: ^3.0.1
  lottie: ^3.0.0
  sqflite: ^2.4.2
  path: ^1.9.1
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_timezone: ^5.0.2
  in_app_review: ^2.0.11
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/themes/
    - assets/images/note themes/
    - assets/images/screens/

